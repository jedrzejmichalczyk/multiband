# Build the WASM solver and publish web/ui/ to GitHub Pages.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.64'

      - name: Configure
        run: emcmake cmake -S web -B web/build-wasm -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build web/build-wasm -j

      - name: Check artefacts
        run: |
          test -s web/ui/solver.js
          test -s web/ui/solver.wasm

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/ui

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
